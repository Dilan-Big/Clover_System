<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Clover System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/login-style.css">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-container">
                <img src="/img/logo.jpg" alt="Clover System Logo" class="login-logo">
                <h1>CLOVER SYSTEM</h1>
                <p>Gestión Logística Avanzada</p>
            </div>

            <form action="/html/index.html" class="login-form">
                <div class="form-group">
                    <label for="user">Usuario</label>
                    <input type="text" id="user" placeholder="nombre@ejemplo.com" required>
                </div>

                <div class="form-group">
                    <div class="label-row">
                        <label for="pass">Contraseña</label>
                        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                    </div>
                    <input type="password" id="pass" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login">
                    INGRESAR AL PANEL
                </button>
            </form>

            <div class="login-footer">
                <p>¿No tienes acceso? <a href="#">Contacta al Administrador</a></p>
            </div>
        </div>
        
        <div class="bg-decoration">
            <div class="circle c1"></div>
            <div class="circle c2"></div>
        </div>
    </div>

</body>
</html>
