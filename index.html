<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística Clover System | Operaciones</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/Clove_System/style.css">
</head>
<body>

    <header class="header">
        <div class="header-brand">
            <img src="/Clove_System/logo.jpg" alt="Logo" class="main-logo">
            <span class="brand-divider">|</span>
            <span class="system-name">LOGÍSTICA CLOVER SYSTEM</span>
        </div>
        
        <div class="header-navigation">
        <a href="/Clove_System/Dashboard.html" class="btn-nav-dashboard">
            VER DASHBOARD
        </a>
    </div>

        <div class="header-user">Asesor: <span>Juan Pérez</span></div>
    </header>

    <main class="main-viewport">
        <form action="#" class="full-screen-form">
            
            <div class="client-quick-bar">
                <div class="form-group">
                    <label for="nombre">Nombre Cliente</label>
                    <input type="text" id="nombre" placeholder="Nombre completo" required>
                </div>
                <div class="form-group">
                    <label for="tel">Teléfono</label>
                    <input type="tel" id="tel" placeholder="300 000 0000" required>
                </div>
                <div class="form-group">
                    <label for="dpto">Departamento</label>
                    <input type="text" id="dpto" placeholder="Ej. Antioquia" required>
                </div>
                <div class="form-group">
                    <label for="ciudad">Ciudad</label>
                    <input type="text" id="ciudad" placeholder="Ej. Medellín" required>
                </div>
                <div class="form-group flex-grow">
                    <label for="dir">Dirección completa</label>
                    <input type="text" id="dir" placeholder="Calle, Carrera, Barrio, Apto" required>
                </div>
            </div>

            <div class="central-obs-zone">
                <div class="obs-header">
                    <div class="selectors-row">
                        <div class="form-group mini-select">
                            <label for="metodo_com">Método de comunicación</label>
                            <select id="metodo_com" required>
                                <option value="" disabled selected>Seleccione...</option>
                                <option value="whatsapp">WhatsApp</option>
                                <option value="chateapro">Chatea Pro</option>
                                <option value="llamada">Llamada</option>
                            </select>
                        </div>
                        <div class="form-group mini-select">
                            <label for="estado_logistico">Estado de Gestión</label>
                            <select id="estado_logistico" required>
                                <option value="" disabled selected>Seleccione estado...</option>
                                <option value="entregado">ENTREGADO</option>
                                <option value="guia_anulada">GUIA_ANULADA</option>
                                <option value="devolucion">DEVOLUCION</option>
                                <option value="guia_generada">GUIA GENERADA</option>
                                <option value="proceso_entrega">PROCESO DE ENTREGA</option>
                                <option value="novedad">NOVEDAD</option>
                                <option value="reclamacion">RECLAMACION</option>
                            </select>
                        </div>
                    </div>
                    <h2>Detalle de la interacción / Observaciones críticas</h2>
                </div>
                
                <div class="textarea-container">
                    <textarea id="observaciones" name="observaciones" maxlength="2000" placeholder="Resumen detallado de la conversación..." required></textarea>
                </div>
            </div>

            <div class="bottom-data-bar">
                <div class="data-section">
                    <h3>Información del Pedido</h3>
                    <div class="sub-grid-pedido">
                        <div class="form-group full-width">
                            <label for="producto">Producto</label>
                            <input type="text" id="producto" placeholder="Producto o SKU" required>
                        </div>
                        <div class="form-group">
                            <label for="cantidad">Cant.</label>
                            <input type="number" id="cantidad" value="1">
                        </div>
                        <div class="form-group">
                            <label for="valor">Valor (COP)</label>
                            <input type="number" id="valor" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label for="fuente">Fuente</label>
                            <select id="fuente">
                                <option value="fb">Facebook</option>
                                <option value="tk">TikTok</option>
                                <option value="ig">Instagram</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="estado_p">Estado Pedido</label>
                            <select id="estado_p">
                                <option value="nuevo">Nuevo</option>
                                <option value="confirmado">Confirmado</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="data-section border-left">
                    <h3>Clasificación Logística</h3>
                    <div class="sub-grid-clasificacion">
                        <div class="form-group">
                            <label for="tipo">Tipo de cliente</label>
                            <select id="tipo">
                                <option value="nuevo">Nuevo</option>
                                <option value="recurrente">Recurrente</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="confianza">Nivel Confianza</label>
                            <select id="confianza">
                                <option value="alto">Alto</option>
                                <option value="riesgoso">Riesgoso</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="action-section">
                    <button type="button" class="btn btn-cancel">CANCELAR</button>
                    <button type="submit" class="btn btn-save">GUARDAR PEDIDO</button>
                </div>
            </div>

        </form>
    </main>

</body>
</html>
